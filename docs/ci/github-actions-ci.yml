name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install Poppler on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium on Linux
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Build and test
        run: npm run verify

      - name: CLI smoke
        shell: bash
        run: |
          node packages/cli/dist/index.js --help
          node packages/cli/dist/index.js probe fixtures/compat-matrix/html/horizontal-transform.html --json --out probe-report.json

      - name: PDF fixture smoke
        if: runner.os == 'Linux'
        shell: bash
        run: |
          node packages/cli/dist/index.js wrap fixtures/compat-matrix/pdf/vector-text.pdf --out /tmp/agentdeck-pdf-smoke --no-verify
          node packages/cli/dist/index.js verify /tmp/agentdeck-pdf-smoke/index.html
