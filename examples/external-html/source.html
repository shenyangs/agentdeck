<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>External Skill Output</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; }
    .slide {
      width: 1920px;
      height: 1080px;
      padding: 120px;
      box-sizing: border-box;
      background: #111827;
      color: #f9fafb;
    }
    .slide:nth-of-type(2) { background: #f9fafb; color: #111827; }
    h1 { margin: 0; font-size: 92px; letter-spacing: 0; }
    p { max-width: 980px; font-size: 36px; line-height: 1.45; }
  </style>
</head>
<body>
  <section class="slide">
    <h1>External HTML Deck</h1>
    <p>This file stands in for any deck generated by a third-party PPT skill or another HTML slide tool.</p>
  </section>
  <section class="slide">
    <h1>Wrapped By AgentDeck</h1>
    <p>AgentDeck preserves the source slide visuals and adds enhanced playback controls around them.</p>
  </section>
</body>
</html>
