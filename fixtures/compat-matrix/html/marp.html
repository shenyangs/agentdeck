<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Marp Smoke</title>
  <style>
    body { margin: 0; overflow-x: hidden; font-family: system-ui, sans-serif; }
    .marpit { width: 200vw; display: flex; transition: transform .2s ease; }
    section { width: 100vw; height: 100vh; flex: 0 0 100vw; display: grid; place-items: center; font-size: 72px; }
  </style>
</head>
<body>
  <main class="marpit">
    <section>Marp 1</section>
    <section>Marp 2</section>
  </main>
  <script>
    let index = 0;
    function render() { document.querySelector(".marpit").style.transform = `translateX(${-index * 100}vw)`; }
    addEventListener("hashchange", () => { index = Number(location.hash.replace(/\D/g, "")) - 1 || 0; render(); });
    addEventListener("keydown", (event) => { if (event.key === "ArrowRight") { index = Math.min(1, index + 1); render(); } });
  </script>
</body>
</html>
