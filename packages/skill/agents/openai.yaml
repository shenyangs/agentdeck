display_name: AgentDeck
short_description: Wrap any deck into enhanced single-file HTML, or route source content through a credited third-party PPT skill first.
default_prompt: Package my deck into an AgentDeck single-file HTML presentation. If I only provide source content, detect installed PPT skills first; if several exist, ask me to choose; if none exist, recommend a credited third-party PPT skill and ask before installing or using it.
